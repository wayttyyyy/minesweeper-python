name: Python CI/CD Pipeline

# Pipeline запускається при кожному push або pull request у гілку main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Завантаження коду репозиторію на віртуальну машину
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Встановлення Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Кешування для швидшого встановлення

    # 3. Встановлення залежностей
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Запуск лінтера Flake8 зі збереженням HTML-звіту
    - name: Lint with flake8
      run: |
        # Створюємо папку для звіту лінтера
        mkdir -p flake8_report
        # Запускаємо перевірку. --exit-zero означає, що pipeline не впаде, якщо є дрібні помилки стилю
        flake8 . --format=html --htmldir=flake8_report --exit-zero

    # 5. Запуск тестів Pytest зі збереженням HTML-звіту
    - name: Test with pytest
      # Для роботи Pygame без реального монітора на Linux-сервері потрібна змінна оточення SDL_VIDEODRIVER
      env:
        SDL_VIDEODRIVER: dummy
      run: |
        mkdir -p pytest_report
        pytest tests/ --html=pytest_report/report.html --self-contained-html

    # 6. Завантаження звіту Flake8 як артефакту (щоб його можна було скачати з GitHub)
    - name: Upload Flake8 Report
      uses: actions/upload-artifact@v4
      if: always() # Виконується завжди, навіть якщо тести впадуть
      with:
        name: flake8-html-report
        path: flake8_report/

    # 7. Завантаження звіту Pytest як артефакту
    - name: Upload Pytest Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-html-report
        path: pytest_report/